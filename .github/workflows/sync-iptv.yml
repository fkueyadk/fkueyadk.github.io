              "wtv.tools.yigechengzi.com",
              "www.goodiptv.club",
              "www.guzhenm.com",
              "yixing-tv-ori-hls.jstv.com",
              "zb.gxlbamc.com",
              "zbbf2.ahbztv.com",
              "zb-live.ynurl.com",
              "zjrtv.vip",
              "zjtv-wshls.homecdn.com",
          }

          def get_host(url):
              try:
                  host = urlparse(url.strip()).hostname
              except:
                  return ""

              return host.lower() if host else ""


          def host_matches(host, ips, domains):
              if host in ips:
                  return True

              return any(host == domain or host.endswith("." + domain) for domain in domains)


          def block_matches(block, ips, domains):
              for line in block:
                  line = line.strip()

                  if not line.startswith(("http://", "https://")):
                      continue

                  host = get_host(line)

                  if host_matches(host, ips, domains):
                      return True

              return False


          def read_blocks(src, ips, domains):
              try:
                  with open(src, "r", encoding="utf-8", errors="ignore") as f:
                      lines = f.readlines()
              except:
                  return []

              kept = []
              current = []

              for line in lines:
                  if line.startswith("#EXTM3U"):
                      continue

                  if line.startswith("#EXTINF"):
                      if current and block_matches(current, ips, domains):
                          kept.append(current)

                      current = [line]
                  elif current:
                      current.append(line)

              if current and block_matches(current, ips, domains):
                  kept.append(current)

              return kept


          blocks = []
          blocks += read_blocks("source.m3u", SOURCE_IPS, set())
          blocks += read_blocks("zbds.m3u", ZBDS_IPS, ZBDS_DOMAINS)

          result = ["#EXTM3U\n"]
          seen_urls = set()

          for block in blocks:
              urls = [
                  line.strip()
                  for line in block
                  if line.strip().startswith(("http://", "https://"))
              ]

              if not urls:
                  continue

              main_url = urls[-1]

              if main_url in seen_urls:
                  continue

              seen_urls.add(main_url)

              for line in block:
                  result.append(line if line.endswith("\n") else line + "\n")

          with open("iptv-full.m3u", "w", encoding="utf-8") as f:
              f.writelines(result)

          print(f"Saved {len(seen_urls)} streams to iptv-full.m3u")
          EOF

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add iptv-full.m3u

          git diff --cached --quiet || git commit -m "Auto sync filtered IPTV full"

          git push
