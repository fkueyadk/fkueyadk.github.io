name: Sync Filtered IPTV Full

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download sources
        run: |
          curl -L "https://raw.githubusercontent.com/ZhaoBing522/IPTV/refs/heads/main/iptv.m3u" -o source.m3u
          curl -L "https://live.zbds.top/tv/iptv4.m3u" -o zbds.m3u

