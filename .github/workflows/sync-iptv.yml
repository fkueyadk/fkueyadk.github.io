              "hwapi.yntv.net",
              "hzcm-live.media.hugd.com",
              "jwcdnqx.hebyun.com.cn",
              "jwplay.hebyun.com.cn",
              "l.cztvcloud.com",
              "lbyzztfe.live.sxmty.com",
