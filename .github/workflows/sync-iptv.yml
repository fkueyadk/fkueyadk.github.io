name: Sync Filtered IPTV Full

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download sources
        run: |
          curl -L "https://raw.githubusercontent.com/ZhaoBing522/IPTV/refs/heads/main/iptv.m3u" -o source.m3u
          curl -L "https://live.zbds.top/tv/iptv4.m3u" -o zbds.m3u

      - name: Filter, EPG normalize, sort and merge
        run: |
          python3 << 'EOF'
          import gzip
          import re
          import urllib.request
          import xml.etree.ElementTree as ET
          from urllib.parse import urlparse

          EPG_URL = "http://epg.51zmt.top:8000/e1.xml.gz"

          SOURCE_IPS = {
              "120.48.231.201",
              "139.227.21.22",
              "223.78.65.165",
          }

          ZBDS_IPS = {
