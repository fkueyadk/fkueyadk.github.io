name: Sync IPTV

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download sources
        run: |
          curl -L "https://raw.githubusercontent.com/jia070310/lemonTV/refs/heads/main/iptv-fe.m3u" -o lemon.m3u
          curl -L "https://raw.githubusercontent.com/Guovin/iptv-api/gd/output/result.m3u" -o guovin.m3u
          curl -L --max-time 15 "http://82.156.243.185:33389/fwc.m3u" -o fwc.m3u || touch fwc.m3u
          curl -L "https://fkueyadk.github.io/iptv-full.m3u" -o iptv-full.m3u
          curl -L "https://raw.githubusercontent.com/SarinV/My-TV/refs/heads/main/my_tv.m3" -o my_tv.m3

      - name: Filter, EPG normalize, sort and merge
        run: |
          python3 << 'EOF'
          import gzip
          import re
          import urllib.request
          import xml.etree.ElementTree as ET

          EPG_URL = "http://epg.51zmt.top:8000/e1.xml.gz"

          BLACKLIST = [
              "iptv.catvod.com",
              "107.150.60.122",
              "74.91.26.218",
              "120.76.248.139",
              "freetv.top",
              "migu.188766.xyz",
              "iptv.huuc.edu.cn",
              "smart.pendy.dpdns.org",
              "cdn.jsdelivr.net/gh/iptvorganization",
              "cdn.99998888.cc",
              "38.75.136.137",
          ]

          def normalize_key(name):
              return (
                  name.upper()
                  .replace(" ", "")
                  .replace("-", "")
                  .replace("_", "")
                  .replace("＋", "+")
              )

          ALIASES = {
              "CCTV5": "CCTV5",
              "CCTV5体育": "CCTV5",
              "CCTV体育": "CCTV5",
              "CCTV5+": "CCTV5+",
              "CCTV5PLUS": "CCTV5+",
              "CCTV5P": "CCTV5+",
              "CCTV5+体育赛事": "CCTV5+",
              "CCTV5P体育赛事": "CCTV5+",
              "CCTV体育赛事": "CCTV5+",
              "CCTV风云足球": "CCTV风云足球",
          }

          ALIASES = {normalize_key(k): v for k, v in ALIASES.items()}

          def load_epg_channels():
              epg_channels = {}
              try:
                  data = urllib.request.urlopen(EPG_URL, timeout=30).read()
                  xml_data = gzip.decompress(data)
                  root = ET.fromstring(xml_data)
              except Exception as e:
                  print(f"Failed to load EPG: {e}")
                  return epg_channels

              for channel in root.findall("channel"):
                  channel_id = channel.get("id", "")
                  display = channel.find("display-name")
                  if display is None or not display.text:
                      continue
                  name = display.text.strip()
                  epg_channels[normalize_key(name)] = {
                      "id": channel_id,
                      "name": name,
                  }

              return epg_channels

          def is_blacklisted(url):
              if "http://[" in url or "https://[" in url:
                  return True
              return any(item in url for item in BLACKLIST)

          def get_channel_name(extinf):
              if "," not in extinf:
                  return ""
              return extinf.rsplit(",", 1)[1].strip()

          def find_epg_channel(original_name, epg_channels):
              key = normalize_key(original_name)
              alias_name = ALIASES.get(key)

              if alias_name:
                  alias_key = normalize_key(alias_name)
                  if alias_key in epg_channels:
                      return epg_channels[alias_key]
                  return {
                      "id": alias_name,
                      "name": alias_name,
                  }

              if key in epg_channels:
                  return epg_channels[key]

              return {
                  "id": original_name,
                  "name": original_name,
              }

          def is_cctv5_name(name):
              epg_name = find_epg_channel(name, EPG_CHANNELS)["name"]
              return epg_name in {"CCTV5", "CCTV5+"}

          def replace_channel_name(extinf, original_name, epg_channel):
              epg_id = epg_channel["id"]
              epg_name = epg_channel["name"]

              if "," in extinf:
                  extinf = extinf.rsplit(",", 1)[0] + "," + epg_name

              extinf = re.sub(r'\s+tvg-id="[^"]*"', "", extinf)
              extinf = re.sub(r'\s+tvg-name="[^"]*"', "", extinf)

              extinf = extinf.replace(
                  "#EXTINF:-1",
                  f'#EXTINF:-1 tvg-id="{epg_id}" tvg-name="{epg_name}"',
                  1
              )

              return extinf.rstrip("\n") + "\n"

          def append_entry(entries, extinf, url, cctv5_only=False):
              if is_blacklisted(url):
                  return

              original_name = get_channel_name(extinf)
              if not original_name:
                  return

              if cctv5_only and not is_cctv5_name(original_name):
                  return

              epg_channel = find_epg_channel(original_name, EPG_CHANNELS)

              entries.append({
                  "name": epg_channel["name"],
                  "extinf": replace_channel_name(extinf, original_name, epg_channel),
                  "url": url if url.endswith("\n") else url + "\n",
              })

          def read_entries(src, cctv5_only=False):
              try:
                  with open(src, "r", encoding="utf-8", errors="ignore") as f:
                      lines = f.readlines()
              except:
                  return []

              entries = []
              i = 0

              while i < len(lines):
                  line = lines[i]

                  if line.startswith("#EXTINF") and i + 1 < len(lines):
                      append_entry(entries, line, lines[i + 1], cctv5_only)
                      i += 2
                  else:
                      i += 1

              return entries

          def read_fengyun_epg_stream(src):
              try:
                  with open(src, "r", encoding="utf-8", errors="ignore") as f:
                      lines = f.readlines()
              except:
                  return []

              i = 0

              while i < len(lines):
                  line = lines[i].strip()

                  if line.startswith("#EXTINF") and i + 1 < len(lines):
                      url = lines[i + 1].strip()

                      if "CCTV风云足球" in line and "https://epg.pw/stream" in url:
                          return [{
                              "name": "CCTV风云足球",
                              "extinf": line + "\n",
                              "url": url + "\n",
                          }]

                      i += 2
                  else:
                      i += 1

              return []

          def sort_key(entry):
              name = entry["name"]

              if name == "CCTV5":
                  return (0, name)

              if name == "CCTV5+":
                  return (1, name)

              if name == "CCTV风云足球":
                  return (2, name)

              match = re.match(r"^CCTV(\d+)$", name)
              if match:
                  return (3, int(match.group(1)), name)

              return (4, name)

          EPG_CHANNELS = load_epg_channels()

          entries = []

          entries += read_entries("lemon.m3u", cctv5_only=True)
          entries += read_entries("guovin.m3u", cctv5_only=True)
          entries += read_entries("iptv-full.m3u", cctv5_only=True)

          fengyun_entries = read_fengyun_epg_stream("my_tv.m3")

          if fengyun_entries:
              entries = [
                  e for e in entries
                  if e["name"] != "CCTV风云足球"
              ]
              entries += fengyun_entries

          entries += read_entries("fwc.m3u", cctv5_only=False)

          if fengyun_entries:
              entries = [
                  e for e in entries
                  if e["name"] != "CCTV风云足球"
              ]
              entries += fengyun_entries

          entries.sort(key=sort_key)

          result = [f'#EXTM3U x-tvg-url="{EPG_URL}"\n']

          seen = set()

          for entry in entries:
              key = (entry["name"], entry["url"].strip())

              if key in seen:
                  continue

              seen.add(key)
              result.append(entry["extinf"])
              result.append(entry["url"])

          with open("iptv.m3u", "w", encoding="utf-8") as f:
              f.writelines(result)

          EOF

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add iptv.m3u

          git diff --cached --quiet || git commit -m "Auto Sync IPTV"

          git push
