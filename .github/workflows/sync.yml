      - name: Keep CCTV only
        run: |
          awk '
          BEGIN{
            keep=0
          }

          /^#EXTM3U/{
            print
            next
          }

          /^#EXTINF/{
            if ($0 ~ /CCTV/) {
              print
              keep=1
            } else {
              keep=0
            }
            next
          }

          {
            if (keep==1) {
              print
              keep=0
            }
          }
          ' source.m3u > iptv.m3u
