name: Sync CCTV IPTV

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download source IPTV
        run: |
          curl -L "https://raw.githubusercontent.com/jia070310/lemonTV/refs/heads/main/iptv-fe.m3u" -o source.m3u

      - name: Keep CCTV only
        run: |
          python3 << 'EOF'
          with open("source.m3u", "r", encoding="utf-8", errors="ignore") as f:
              lines = f.readlines()

          out = []

          for i, line in enumerate(lines):
              if line.startswith("#EXTM3U"):
                  out.append(line)
              elif line.startswith("#EXTINF") and "CCTV" in line:
                  out.append(line)
                  if i + 1 < len(lines):
                      out.append(lines[i + 1])

          with open("iptv.m3u", "w", encoding="utf-8") as f:
              f.writelines(out)
          EOF

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add iptv.m3u
          git diff --cached --quiet || git commit -m "Auto Sync CCTV Only"
          git push
