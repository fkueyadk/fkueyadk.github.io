name: Sync IPTV

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download sources
        run: |
          curl -L "https://raw.githubusercontent.com/jia070310/lemonTV/refs/heads/main/iptv-fe.m3u" -o lemon.m3u
          curl -L "https://raw.githubusercontent.com/Guovin/iptv-api/gd/output/result.m3u" -o guovin.m3u
          curl -L --max-time 15 "http://82.156.243.185:33389/fwc.m3u" -o fwc.m3u || touch fwc.m3u
          curl -L "https://fkueyadk.github.io/iptv-full.m3u" -o iptv-full.m3u

      - name: Filter, normalize, sort and merge
        run: |
          python3 << 'EOF'
          import re

          BLACKLIST = [
              "iptv.catvod.com",
              "107.150.60.122",
              "74.91.26.218",
              "120.76.248.139",
              "freetv.top",
              "migu.188766.xyz",
              "iptv.huuc.edu.cn",
              "smart.pendy.dpdns.org",
              "cdn.jsdelivr.net/gh/iptvorganization",
              "cdn.99998888.cc",
              "38.75.136.137",
          ]

          def is_blacklisted(url):
              if "http://[" in url or "https://[" in url:
                  return True

              return any(item in url for item in BLACKLIST)


          def get_channel_name(extinf):
              if "," not in extinf:
                  return ""

              return extinf.rsplit(",", 1)[1].strip()


          def normalize_channel_name(name):
              raw = name.strip()
              compact = raw.upper().replace(" ", "")

              cctv5_plus_names = {
                  "CCTV5+",
                  "CCTV-5+",
                  "CCTV5PLUS",
                  "CCTV-5PLUS",
                  "CCTV5P",
                  "CCTV-5P",
                  "CCTV5P体育赛事",
                  "CCTV-5P体育赛事",
                  "CCTV5+体育赛事",
                  "CCTV-5+体育赛事",
                  "CCTV体育赛事",
              }

              cctv5_names = {
                  "CCTV5",
                  "CCTV-5",
                  "CCTV5体育",
                  "CCTV-5体育",
                  "CCTV体育",
              }

              if compact in cctv5_plus_names:
                  return "CCTV-5+"

              if compact in cctv5_names:
                  return "CCTV-5"

              match = re.match(r"^CCTV[- ]?(\d+)(.*)$", raw, re.I)
              if match:
                  number = match.group(1)
                  suffix = match.group(2).strip()

                  if suffix:
                      return f"CCTV-{number}{suffix}"

                  return f"CCTV-{number}"

              return raw
