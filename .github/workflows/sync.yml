name: Sync IPTV

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download sources
        run: |
          curl -L "https://raw.githubusercontent.com/jia070310/lemonTV/refs/heads/main/iptv-fe.m3u" -o lemon.m3u
          curl -L "https://raw.githubusercontent.com/Guovin/iptv-api/gd/output/result.m3u" -o guovin.m3u
          curl -L --max-time 15 "http://82.156.243.185:33389/fwc.m3u" -o fwc.m3u || touch fwc.m3u

      - name: Filter and merge
        run: |
          python3 << 'EOF'

          BLACKLIST = [
              "iptv.catvod.com",
              "107.150.60.122",
              "74.91.26.218",
              "120.76.248.139",
              "freetv.top",
              "migu.188766.xyz",
              "iptv.huuc.edu.cn",
              "smart.pendy.dpdns.org",
              "cdn.jsdelivr.net/gh/iptvorganization",
              "cdn.99998888.cc"
              "38.75.136.137"
          ]

          def is_blacklisted(url):

              # 过滤 IPv6 源
              if "http://[" in url:
                  return True

              if "https://[" in url:
                  return True

              for item in BLACKLIST:
                  if item in url:
                      return True

              return False


          # lemonTV、Guovin：仅保留 CCTV5 / CCTV-5
          def filter_cctv5(src):

              try:
                  with open(src, "r", encoding="utf-8", errors="ignore") as f:
                      lines = f.readlines()
              except:
                  return []

              out = []

              for i, line in enumerate(lines):

                  if not line.startswith("#EXTINF"):
                      continue

                  if ("CCTV5" not in line) and ("CCTV-5" not in line):
                      continue

                  if i + 1 >= len(lines):
                      continue

                  url = lines[i + 1]

                  if is_blacklisted(url):
                      continue

                  out.append(line)
                  out.append(url)

              return out


          # FWC：保留全部频道，但过滤黑名单和 IPv6
          def append_full_filtered(src):

              try:
                  with open(src, "r", encoding="utf-8", errors="ignore") as f:
                      lines = f.readlines()
              except:
                  return []

              out = []

              i = 0

              while i < len(lines):

                  line = lines[i]

                  if line.startswith("#EXTINF"):

                      if i + 1 < len(lines):

                          url = lines[i + 1]

                          if not is_blacklisted(url):
                              out.append(line)
                              out.append(url)

                      i += 2

                  else:
                      i += 1

              return out


          result = ["#EXTM3U\n"]

          # lemonTV：仅保留 CCTV5
          result += filter_cctv5("lemon.m3u")

          # Guovin：仅保留 CCTV5
          result += filter_cctv5("guovin.m3u")

          # FWC：保留全部频道，但过滤黑名单和 IPv6
          result += append_full_filtered("fwc.m3u")

          with open("iptv.m3u", "w", encoding="utf-8") as f:
              f.writelines(result)

          EOF

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add iptv.m3u

          git diff --cached --quiet || git commit -m "Auto Sync IPTV"

          git push
